name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11"]
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref || github.ref_name }}
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - name: Install
        run: python -m pip install -e '.[dev]'
      - name: Apply Ruff fixes
        run: ruff check . --fix
      - name: Commit Ruff fixes
        if: github.event_name == 'pull_request'
        run: |
          if git diff --quiet; then
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/grid_agent tests
          git commit -m "style: apply Ruff import ordering"
          git push origin HEAD:${{ github.head_ref }}
      - name: Lint
        run: ruff check .
      - name: Test
        run: pytest
      - name: Run diagnosis demo
        run: grid-agent diagnose examples/feeder_10kv.json --format json
      - name: Run simulation demo
        run: grid-agent simulate examples/gridsociety_incident.json --format json
