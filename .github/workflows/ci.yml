name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - name: Install
        run: python -m pip install -e '.[dev]'
      - name: Generate lint report
        continue-on-error: true
        run: ruff check . --output-format=concise > ruff-report.txt
      - name: Upload lint report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ruff-report-${{ matrix.python-version }}
          path: ruff-report.txt
      - name: Lint
        run: ruff check .
      - name: Test
        run: pytest
      - name: Run diagnosis demo
        run: grid-agent diagnose examples/feeder_10kv.json --format json
      - name: Run simulation demo
        run: grid-agent simulate examples/gridsociety_incident.json --format json
